<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGC 受発注管理 - 館山ジビエセンター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0f0a;--surface:#141710;--surface2:#1c1f16;
--border:#2a2e22;--border2:#363b2a;
--gold:#c8a45a;--gold2:#a07e38;--gold-light:#e8c878;
--text:#e8e4d8;--text2:#8a8670;--text3:#5a5848;
--red:#c85050;--green:#6a9e5a;--blue:#5a8cd8;
--radius:8px;
}
html{font-size:14px}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold-light)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--text)}
input,select,textarea{font-family:inherit;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:.9rem;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold2)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text2);font-weight:500;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{font-size:.9rem}
tr:hover{background:var(--surface2)}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;letter-spacing:.5px;display:inline-block;white-space:nowrap}
.badge-受注{background:rgba(240,192,64,.15);color:#f0c040;border:1px solid #f0c040}
.badge-確認済{background:rgba(90,140,216,.15);color:#5a8cd8;border:1px solid #5a8cd8}
.badge-発送済{background:rgba(200,164,90,.15);color:#c8a45a;border:1px solid #a07e38}
.badge-納品完了{background:rgba(106,158,90,.15);color:#6a9e5a;border:1px solid #6a9e5a}
.badge-キャンセル{background:rgba(200,80,80,.15);color:#c85050;border:1px solid #c85050}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left{display:flex;align-items:center;gap:16px}
.header-left h1{font-size:1.2rem;font-weight:700;color:var(--gold)}
.header-nav{display:flex;gap:12px;font-size:.85rem}
.header-right{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:.85rem;font-weight:500;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0d0f0a;font-weight:700}
.btn-gold:hover{filter:brightness(1.1)}
.btn-outline{border:1px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--gold2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:.78rem}
.btn-danger{background:rgba(200,80,80,.15);color:var(--red);border:1px solid var(--red)}
.btn-blue{background:rgba(90,140,216,.15);color:var(--blue);border:1px solid var(--blue)}
.btn-green{background:rgba(106,158,90,.15);color:var(--green);border:1px solid var(--green)}

.tabs{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;overflow-x:auto}
.tab{padding:14px 20px;font-size:.9rem;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}

.status-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;text-align:center}
.status-card:hover,.status-card.active{border-color:var(--gold2)}
.status-card .count{font-size:1.8rem;font-weight:700;color:var(--gold)}
.status-card .label{font-size:.8rem;color:var(--text2);margin-top:2px}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-bar .filter-btns{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:.8rem;border:1px solid var(--border);color:var(--text2);transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(200,164,90,.08)}
.search-input{min-width:200px;flex:1;max-width:300px}

.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.modal-wide{max-width:1000px}
.modal h2{font-size:1.1rem;color:var(--gold);margin-bottom:20px}
.modal-close{float:right;font-size:1.2rem;cursor:pointer;color:var(--text2);padding:4px 8px}
.modal-close:hover{color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.ship-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ship-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ship-card-title{font-weight:700;color:var(--gold)}
.ship-card-info{font-size:.85rem;color:var(--text2);margin-bottom:6px}
.ship-card-items{font-size:.85rem;color:var(--text)}
.ship-actions{display:flex;gap:8px;margin-top:10px}

.doc-section{margin-bottom:20px}
.doc-section h3{font-size:.95rem;color:var(--gold);margin-bottom:10px}
.order-checks{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:8px}
.order-check-item{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid var(--border)}
.order-check-item:last-child{border:none}
.order-check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--gold)}
.doc-buttons{display:flex;gap:8px;flex-wrap:wrap}

.customer-table td{font-size:.85rem}
.price-rank{font-size:.75rem;padding:2px 8px;border-radius:10px;font-weight:700}
.rank-standard{background:rgba(200,164,90,.15);color:var(--gold)}
.rank-premium{background:rgba(200,80,80,.15);color:#e88;border:1px solid #c66}
.rank-wholesale{background:rgba(90,140,216,.15);color:var(--blue)}

.product-tabs{display:flex;gap:4px;margin-bottom:12px}
.product-tab{padding:6px 14px;border-radius:20px;font-size:.8rem;border:1px solid var(--border);color:var(--text2)}
.product-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(200,164,90,.08)}
.product-list{display:grid;gap:8px;max-height:300px;overflow-y:auto}
.product-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid var(--border);border-radius:var(--radius)}
.product-item .name{font-size:.9rem}
.product-item .price{color:var(--gold);font-size:.85rem}
.product-item input{width:80px;text-align:center}
.cart-items{margin:12px 0;max-height:200px;overflow-y:auto}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.cart-total{text-align:right;font-size:1.1rem;font-weight:700;color:var(--gold);padding:10px 0;border-top:1px solid var(--border)}
.empty{text-align:center;color:var(--text3);padding:40px;font-size:.9rem}
.loading{text-align:center;color:var(--text2);padding:30px}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:16px}

#docPreview .doc-preview-content{background:#fff;color:#222;padding:40px;border-radius:4px;font-family:'Noto Sans JP',sans-serif;max-width:210mm;margin:0 auto}
#docPreview .doc-header{text-align:center;margin-bottom:24px;border-bottom:2px solid #222;padding-bottom:16px}
#docPreview .doc-header h2{font-size:1.4rem;margin-bottom:4px}
#docPreview .doc-header .doc-sub{font-size:.8rem;color:#666}
#docPreview .doc-meta{display:flex;justify-content:space-between;margin-bottom:20px;font-size:.85rem}
#docPreview .doc-customer{margin-bottom:16px}
#docPreview .doc-customer h3{font-size:1rem;border-bottom:1px solid #ccc;padding-bottom:4px;margin-bottom:4px}
#docPreview table{width:100%;border-collapse:collapse;margin-bottom:16px}
#docPreview th,#docPreview td{border:1px solid #ccc;padding:8px;text-align:right;font-size:.85rem}
#docPreview th{background:#f5f5f0;text-align:center;font-weight:700}
#docPreview td:first-child{text-align:left}
#docPreview .doc-totals{text-align:right;font-size:.95rem;margin-bottom:16px}
#docPreview .doc-totals .total-row{padding:4px 0}
#docPreview .doc-totals .grand-total{font-size:1.2rem;font-weight:700;color:#c00}
#docPreview .doc-issuer{margin-top:30px;text-align:right;font-size:.8rem;line-height:1.8}
#docPreview .doc-stamp{border:2px solid #c00;color:#c00;display:inline-block;padding:8px 16px;border-radius:50%;font-weight:700;transform:rotate(-15deg);margin-top:10px}
.doc-actions{display:flex;gap:8px;margin-bottom:16px;justify-content:flex-end}

@media print{
body *{visibility:hidden}
#docPreview,#docPreview *{visibility:visible}
#docPreview{position:absolute;left:0;top:0;width:100%}
#docPreview .doc-actions{display:none}
}
@media(max-width:768px){
header{padding:10px 14px}
.main{padding:14px}
.form-row,.form-row3{grid-template-columns:1fr}
.modal{padding:18px;margin:10px}
th,td{padding:8px 6px;font-size:.8rem}
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>TGC 受発注管理</h1>
    <nav class="header-nav">
      <a href="inventory.html">在庫管理</a>
      <a href="capture.html">捕獲票</a>
      <a href="portal.html">注文ポータル</a>
    </nav>
  </div>
  <div class="header-right">
    <button class="btn btn-gold" onclick="openManualOrder()">+ 手入力注文</button>
    <button class="btn btn-outline" onclick="refreshAll()">&#x1f504; 更新</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="orders" onclick="switchTab('orders')">&#x1f4cb; 注文一覧</div>
  <div class="tab" data-tab="shipping" onclick="switchTab('shipping')">&#x1f69a; 発送管理</div>
  <div class="tab" data-tab="documents" onclick="switchTab('documents')">&#x1f4c4; 書類発行</div>
  <div class="tab" data-tab="customers" onclick="switchTab('customers')">&#x1f464; 顧客管理</div>
</div>

<div class="main">
  <!-- Tab 1: 注文一覧 -->
  <div class="tab-content active" id="tab-orders">
    <div class="status-cards" id="statusCards"></div>
    <div class="filter-bar">
      <div class="filter-btns" id="statusFilters">
        <button class="filter-btn active" data-status="all" onclick="filterOrders('all',this)">全て</button>
        <button class="filter-btn" data-status="受注" onclick="filterOrders('受注',this)">受注</button>
        <button class="filter-btn" data-status="確認済" onclick="filterOrders('確認済',this)">確認済</button>
        <button class="filter-btn" data-status="発送済" onclick="filterOrders('発送済',this)">発送済</button>
        <button class="filter-btn" data-status="納品完了" onclick="filterOrders('納品完了',this)">納品完了</button>
        <button class="filter-btn" data-status="キャンセル" onclick="filterOrders('キャンセル',this)">キャンセル</button>
      </div>
      <input class="search-input" type="text" placeholder="注文番号・顧客名で検索..." id="orderSearch" oninput="renderOrders()">
      <button class="btn btn-outline btn-sm" onclick="exportB2CSV()">&#x1f4e6; 送り状CSV出力</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>注文番号</th><th>顧客名</th><th>納品希望日</th><th>品目</th><th>金額</th><th>ステータス</th><th>操作</th></tr></thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 2: 発送管理 -->
  <div class="tab-content" id="tab-shipping">
    <h3 style="color:var(--gold);margin-bottom:16px">発送待ち注文</h3>
    <div id="shippingList"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- Tab 3: 書類発行 -->
  <div class="tab-content" id="tab-documents">
    <div class="doc-section">
      <h3>顧客・期間選択</h3>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label>顧客</label>
          <select id="docCustomer" onchange="loadDocOrders()"><option value="">-- 選択 --</option></select>
        </div>
        <div class="form-group">
          <label>期間</label>
          <select id="docPeriod" onchange="loadDocOrders()">
            <option value="thisMonth">今月</option>
            <option value="lastMonth">先月</option>
            <option value="thisYear">今年度</option>
            <option value="custom">カスタム</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="docCustomDates" style="display:none;margin-bottom:12px">
        <div class="form-group"><label>開始日</label><input type="date" id="docDateFrom" onchange="loadDocOrders()"></div>
        <div class="form-group"><label>終了日</label><input type="date" id="docDateTo" onchange="loadDocOrders()"></div>
      </div>
    </div>
    <div class="doc-section">
      <h3>注文選択</h3>
      <div style="margin-bottom:8px"><label><input type="checkbox" id="docSelectAll" onchange="toggleDocSelectAll()" style="accent-color:var(--gold)"> 全て選択</label></div>
      <div class="order-checks" id="docOrderList"><div class="empty">顧客を選択してください</div></div>
    </div>
    <div class="doc-section">
      <h3>書類発行</h3>
      <div class="doc-buttons">
        <button class="btn btn-gold" onclick="generateDoc('見積書')">見積書</button>
        <button class="btn btn-gold" onclick="generateDoc('納品書')">納品書</button>
        <button class="btn btn-gold" onclick="generateDoc('請求書')">請求書</button>
        <button class="btn btn-gold" onclick="generateDoc('領収書')">領収書</button>
      </div>
    </div>
  </div>

  <!-- Tab 4: 顧客管理 -->
  <div class="tab-content" id="tab-customers">
    <div class="filter-bar">
      <input class="search-input" type="text" placeholder="名前・コード・電話で検索..." id="custSearch" oninput="renderCustomers()">
      <button class="btn btn-gold btn-sm" onclick="openAddCustomer()">+ 顧客追加</button>
    </div>
    <div class="table-wrap">
      <table class="customer-table">
        <thead><tr><th>コード</th><th>名前</th><th>カナ</th><th>電話</th><th>住所</th><th>価格ランク</th><th>操作</th></tr></thead>
        <tbody id="custBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="custPagination"></div>
  </div>
</div>

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderDetailModal">
  <div class="modal modal-wide">
    <span class="modal-close" onclick="closeModal('orderDetailModal')">&times;</span>
    <h2 id="odTitle">注文詳細</h2>
    <div id="odContent"></div>
  </div>
</div>

<!-- Manual Order Modal -->
<div class="modal-overlay" id="manualOrderModal">
  <div class="modal modal-wide">
    <span class="modal-close" onclick="closeModal('manualOrderModal')">&times;</span>
    <h2>手入力注文</h2>
    <div id="moContent">
      <div class="form-row">
        <div class="form-group"><label>顧客</label><select id="moCustomer" onchange="onMoCustomerChange()"><option value="">-- 選択 --</option></select></div>
        <div class="form-group"><label>受注チャネル</label>
          <select id="moChannel"><option>電話</option><option>FAX</option><option>メール</option><option>直接</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>納品希望日</label><input type="date" id="moDate"></div>
        <div class="form-group"><label>時間帯</label>
          <select id="moTimeZone">
            <option value="0000">指定なし</option><option value="0812">午前中</option><option value="1416">14〜16時</option><option value="1618">16〜18時</option><option value="1820">18〜20時</option><option value="1921">19〜21時</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>配送先住所</label><input type="text" id="moAddress"></div>
      <div class="form-row">
        <div class="form-group"><label>配送先名</label><input type="text" id="moDelivName"></div>
        <div class="form-group"><label>配送先電話</label><input type="text" id="moDelivPhone"></div>
      </div>
      <h3 style="color:var(--gold);margin:16px 0 8px">商品選択</h3>
      <div class="product-tabs" id="moSpeciesTabs"></div>
      <div class="product-list" id="moProductList"></div>
      <h3 style="color:var(--gold);margin:16px 0 8px">カート</h3>
      <div class="cart-items" id="moCart"><div class="empty">商品を追加してください</div></div>
      <div class="cart-total" id="moTotal">合計: &yen;0</div>
      <div class="form-group"><label>備考</label><textarea id="moMemo" rows="2"></textarea></div>
      <button class="btn btn-gold" style="width:100%;margin-top:10px" onclick="submitManualOrder()">注文を登録</button>
    </div>
  </div>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal-overlay" id="custModal">
  <div class="modal">
    <span class="modal-close" onclick="closeModal('custModal')">&times;</span>
    <h2 id="custModalTitle">顧客追加</h2>
    <input type="hidden" id="custEditId">
    <div class="form-row">
      <div class="form-group"><label>コード</label><input type="text" id="cfCode" readonly></div>
      <div class="form-group"><label>名前</label><input type="text" id="cfName"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>カナ</label><input type="text" id="cfKana"></div>
      <div class="form-group"><label>電話</label><input type="text" id="cfPhone"></div>
    </div>
    <div class="form-group"><label>住所</label><input type="text" id="cfAddress"></div>
    <div class="form-group"><label>建物名</label><input type="text" id="cfBuilding"></div>
    <div class="form-row">
      <div class="form-group"><label>担当者名</label><input type="text" id="cfContact"></div>
      <div class="form-group"><label>メール</label><input type="text" id="cfEmail"></div>
    </div>
    <div class="form-row3">
      <div class="form-group"><label>会社名1</label><input type="text" id="cfCompany1"></div>
      <div class="form-group"><label>会社名2</label><input type="text" id="cfCompany2"></div>
      <div class="form-group"><label>敬称</label><input type="text" id="cfHonorific" value="様"></div>
    </div>
    <div class="form-row3">
      <div class="form-group"><label>価格ランク</label>
        <select id="cfRank"><option value="standard">standard</option><option value="premium">premium</option><option value="wholesale">wholesale</option></select>
      </div>
      <div class="form-group"><label>デフォルト商品</label><input type="text" id="cfDefaultItem"></div>
      <div class="form-group"><label>時間帯</label><input type="text" id="cfTimeZone" value="0000"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ご依頼主コード</label><input type="text" id="cfReqCode"></div>
      <div class="form-group"><label>ご依頼主電話</label><input type="text" id="cfReqPhone"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>ポータルパスワード</label><input type="text" id="cfPassword"></div>
      <div class="form-group"><label>有効</label>
        <select id="cfActive"><option value="true">有効</option><option value="false">無効</option></select>
      </div>
    </div>
    <button class="btn btn-gold" style="width:100%;margin-top:14px" onclick="saveCustomer()">保存</button>
  </div>
</div>

<!-- Document Preview Modal -->
<div class="modal-overlay" id="docPreview">
  <div class="modal modal-wide">
    <div class="doc-actions">
      <button class="btn btn-gold" onclick="window.print()">&#x1f5a8; 印刷</button>
      <button class="btn btn-outline" onclick="closeModal('docPreview')">閉じる</button>
    </div>
    <div class="doc-preview-content" id="docPreviewContent"></div>
  </div>
</div>

async function sb(method,table,body,query=''){
  const res=await fetch(`${SB_URL}/rest/v1/${table}${query}`,{
    method,
    headers:{
      'apikey':SB_KEY,
      'Authorization':`Bearer ${SB_KEY}`,
      'Content-Type':'application/json',
      'Prefer':method==='POST'?'return=representation':(method==='PATCH'?'return=representation':'')
    },
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok) throw new Error(await res.text());
  const t=await res.text();
  return t?JSON.parse(t):[];
}

// ── Status Cards ──
function renderStatusCards(){
  const statuses=['受注','確認済','発送済','納品完了'];

  statuses.forEach(s=>counts[s]=0);
  allOrders.forEach(o=>{if(counts[o.status]!==undefined)counts[o.status]++});
  document.getElementById('statusCards').innerHTML=statuses.map(s=>`
    <div class="status-card${currentFilter===s?' active':''}" onclick="filterOrders('${s}')">

function generateB2CSVFromOrders(orders){
  const header='お届け先コード,お届け先電話番号,お届け先電話番号枝番,お届け先郵便番号,お届け先住所,お届け先建物名（アパートマンション名）,お届け先会社・部門名１,お届け先会社・部門名２,お届け先名（漢字）,お届け先名略称カナ,お届け先敬称,ご依頼主コード,ご依頼主電話番号,ご依頼主電話番号枝番,荷扱い１,荷扱い２,記事,品名コード１,品名１,品名コード２,品名２,配達時間帯区分,お届け予定ｅメール利用区分,お届け予定ｅメールe-mailアドレス,お届け予定ｅメール入力機種種別,お届け完了ｅメール利用区分,お届け完了ｅメールe-mailアドレス,投函予定メール利用区分,投函予定メールe-mailアドレス,投函完了メール（お届け先宛）利用区分,投函完了メール（お届け先宛）e-mailアドレス,投函完了メール（ご依頼主宛）利用区分,投函完了メール（ご依頼主宛）e-mailアドレス';
  const rows=orders.map(o=>{
    const cust=allCustomers.find(c=>c.id===o.customer_id)||{};
    const items=o.order_items||[];
    const addr=o.delivery_address||cust.address||'';
    const postalMatch=addr.match(/〒(\d{3}-?\d{4})/);
    const postal=o.delivery_postal||(postalMatch?postalMatch[1]:'')||'';
    const cleanAddr=addr.replace(/〒\d{3}-?\d{4}\s*/,'');
    const phone=(o.delivery_phone||cust.phone||'').replace(/-/g,'');
    const species=[...new Set(items.map(i=>i.species).filter(Boolean))];
    const product1=species[0]?species[0]+'肉':'ジビエ肉';
    const product2=species[1]?species[1]+'肉':'';
    const tz=o.delivery_time_zone||cust.default_time_zone||'';
    const building=o.delivery_building||cust.building||'';
    const vals=[
      cust.code||'',phone,'',postal,csvSafe(cleanAddr),csvSafe(building),
      csvSafe(cust.company1||''),csvSafe(cust.company2||''),
      csvSafe(o.delivery_name||cust.name||''),csvSafe(cust.kana||''),cust.honorific||'様',
      'tgc','0470-29-3919','','冷凍','',o.order_code||'',
      '',csvSafe(product1),'',csvSafe(product2),
      tz,'','','','','','','','','','',''
    ];
    return vals.join(',');
  });
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`yamato_b2_${today()}.csv`;a.click();
  URL.revokeObjectURL(url);
}

function csvSafe(s){
  if(!s) return '';
  s=String(s);
  if(s.includes(',')||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

async function loadDocOrders(){
  const custId=document.getElementById('docCustomer').value;
  const period=document.getElementById('docPeriod').value;
  document.getElementById('docCustomDates').style.display=period==='custom'?'grid':'none';
  if(!custId){document.getElementById('docOrderList').innerHTML='<div class="empty">顧客を選択してください</div>';return}
  let dateFrom,dateTo;
  const now=new Date();
  if(period==='thisMonth'){dateFrom=new Date(now.getFullYear(),now.getMonth(),1);dateTo=new Date(now.getFullYear(),now.getMonth()+1,0)}
  else if(period==='lastMonth'){dateFrom=new Date(now.getFullYear(),now.getMonth()-1,1);dateTo=new Date(now.getFullYear(),now.getMonth(),0)}
  else if(period==='thisYear'){const fy=now.getMonth()>=3?now.getFullYear():now.getFullYear()-1;dateFrom=new Date(fy,3,1);dateTo=new Date(fy+1,2,31)}
  else{
    const f=document.getElementById('docDateFrom').value;const t=document.getElementById('docDateTo').value;
    if(!f||!t) return;
    dateFrom=new Date(f);dateTo=new Date(t);
  }
  const from=fmtDate(dateFrom),to=fmtDate(dateTo);
  try{
    docOrders=await sb('GET','orders','',`?customer_id=eq.${custId}&order_date=gte.${from}&order_date=lte.${to}&select=*,order_items(*)&order=order_date.asc`);
    renderDocOrders();
  }catch(e){console.error(e);document.getElementById('docOrderList').innerHTML='<div class="empty">エラーが発生しました</div>'}
}

function renderDocOrders(){
  const el=document.getElementById('docOrderList');
  if(!docOrders.length){el.innerHTML='<div class="empty">該当する注文がありません</div>';return}
  el.innerHTML=docOrders.map(o=>{
    const items=(o.order_items||[]).map(i=>`${i.species||''} ${i.part_name||''}`).join(', ');
    return `<div class="order-check-item">
      <input type="checkbox" data-oid="${o.id}">
      <div>
        <strong>${esc(o.order_code||'')}</strong> | ${o.order_date||''} | &yen;${Number(o.total_amount||0).toLocaleString()}<br>
        <span style="font-size:.8rem;color:var(--text2)">${esc(items)}</span>
      </div>
    </div>`}).join('');
}

  const page=filtered.slice(start,start+custPage.size);
  const body=document.getElementById('custBody');
  body.innerHTML=page.map(c=>{
    const rankClass={'standard':'rank-standard','premium':'rank-premium','wholesale':'rank-wholesale'}[c.price_rank]||'rank-standard';
    return `<tr>

}

function openEditCustomer(id){
  const c=allCustomers.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('custModalTitle').textContent='顧客編集';
  document.getElementById('custEditId').value=id;
  document.getElementById('cfCode').value=c.code||'';
  document.getElementById('cfName').value=c.name||'';
  document.getElementById('cfKana').value=c.kana||'';
  document.getElementById('cfPhone').value=c.phone||'';
  document.getElementById('cfAddress').value=c.address||'';
  document.getElementById('cfBuilding').value=c.building||'';
  document.getElementById('cfContact').value=c.contact_name||'';
  document.getElementById('cfEmail').value=c.email||'';
  document.getElementById('cfCompany1').value=c.company1||'';
  document.getElementById('cfCompany2').value=c.company2||'';
  document.getElementById('cfHonorific').value=c.honorific||'様';
  document.getElementById('cfRank').value=c.price_rank||'standard';
  document.getElementById('cfActive').value=c.is_active===false?'false':'true';
  document.getElementById('cfDefaultItem').value=c.default_item||'';
  document.getElementById('cfTimeZone').value=c.default_time_zone||'0000';
  document.getElementById('cfReqCode').value=c.requester_code||'';
  document.getElementById('cfReqPhone').value=c.requester_phone||'';
  document.getElementById('cfPassword').value=c.portal_password||'';
  openModal('custModal');
}

async function saveCustomer(){
  const id=document.getElementById('custEditId').value;
  const phone=document.getElementById('cfPhone').value;
  const pw=document.getElementById('cfPassword').value||phone.replace(/\D/g,'').slice(-6);
  const data={
    code:document.getElementById('cfCode').value,
    name:document.getElementById('cfName').value,
    kana:document.getElementById('cfKana').value,
    phone:phone,
    address:document.getElementById('cfAddress').value,
    building:document.getElementById('cfBuilding').value,
    contact_name:document.getElementById('cfContact').value,
    email:document.getElementById('cfEmail').value,
    company1:document.getElementById('cfCompany1').value,
    company2:document.getElementById('cfCompany2').value,
    honorific:document.getElementById('cfHonorific').value,
    price_rank:document.getElementById('cfRank').value,
    is_active:document.getElementById('cfActive').value==='true',
    default_item:document.getElementById('cfDefaultItem').value,
    default_time_zone:document.getElementById('cfTimeZone').value,
    requester_code:document.getElementById('cfReqCode').value,
    requester_phone:document.getElementById('cfReqPhone').value,
    portal_password:pw
  };
  if(!data.name){alert('名前を入力してください');return}
  try{
    if(id){await sb('PATCH','customers',data,`?id=eq.${id}`)}
    else{await sb('POST','customers',[data])}
    closeModal('custModal');
    await loadCustomers();
    populateCustomerDropdowns();
  }catch(e){alert('保存エラー: '+e.message)}
}

// ── Manual Order ──
function populateCustomerDropdowns(){
  ['moCustomer','docCustomer'].forEach(selId=>{
    const sel=document.getElementById(selId);
    const val=sel.value;
    sel.innerHTML='<option value="">-- 選択 --</option>';
    allCustomers.filter(c=>c.is_active!==false).forEach(c=>{
      const op=document.createElement('option');
      op.value=c.id;op.textContent=`${c.code} ${c.name}`;
      sel.appendChild(op);
    });
    if(val) sel.value=val;
  });
}

function onMoCustomerChange(){
  const c=allCustomers.find(x=>x.id===document.getElementById('moCustomer').value);
  if(!c) return;
  document.getElementById('moAddress').value=c.address||'';
  document.getElementById('moDelivName').value=c.name||'';
  document.getElementById('moDelivPhone').value=c.phone||'';
  document.getElementById('moTimeZone').value=c.default_time_zone||'0000';
}

function openManualOrder(){
  moCart=[];
  renderMoCart();
  document.getElementById('moMemo').value='';
  document.getElementById('moDate').value=tomorrow();
  renderMoProducts();
  openModal('manualOrderModal');
}

function renderMoProducts(){
  const speciesSet=[...new Set(allProducts.map(p=>p.species))];
  if(!moSpecies&&speciesSet.length) moSpecies=speciesSet[0];
  document.getElementById('moSpeciesTabs').innerHTML=speciesSet.map(s=>
    `<button class="product-tab${s===moSpecies?' active':''}" onclick="moSpecies='${s}';renderMoProducts()">${esc(s)}</button>`
  ).join('');
  const prods=allProducts.filter(p=>p.species===moSpecies);
  const custId=document.getElementById('moCustomer').value;
  const cust=allCustomers.find(c=>c.id===custId);
  const rank=cust?.price_rank||'standard';
  document.getElementById('moProductList').innerHTML=prods.map(p=>{
    const price=p['price_'+rank]||p.price_standard||0;
    return `<div class="product-item">
      <div><div class="name">${esc(p.part_name||'')}</div><div class="price">&yen;${Number(price).toLocaleString()}/kg</div></div>
      <div style="display:flex;gap:6px;align-items:center">
        <input type="number" min="0" step="0.1" placeholder="kg" id="mow_${p.id}">
        <button class="btn btn-gold btn-sm" onclick="addToMoCart('${p.id}')">追加</button>
      </div>
    </div>`}).join('');
}

function addToMoCart(pid){
  const inp=document.getElementById('mow_'+pid);
  const wt=parseFloat(inp?.value);
  if(!wt||wt<=0){alert('重量を入力してください');return}
  const p=allProducts.find(x=>x.id===pid);
  if(!p) return;
  const custId=document.getElementById('moCustomer').value;
  const cust=allCustomers.find(c=>c.id===custId);
  const rank=cust?.price_rank||'standard';
  const price=p['price_'+rank]||p.price_standard||0;
  moCart.push({product_id:pid,species:p.species,part_name:p.part_name,weight_kg:wt,unit_price:price,subtotal:Math.round(wt*price)});
  if(inp) inp.value='';
  renderMoCart();
}

function removeMoCart(idx){moCart.splice(idx,1);renderMoCart()}

function renderMoCart(){
  const el=document.getElementById('moCart');
  if(!moCart.length){el.innerHTML='<div class="empty">商品を追加してください</div>';document.getElementById('moTotal').textContent='合計: ¥0';return}
  el.innerHTML=moCart.map((c,i)=>`<div class="cart-item">
    <div>${esc(c.species)} ${esc(c.part_name)} ${c.weight_kg}kg &times; &yen;${c.unit_price.toLocaleString()}</div>
    <div style="display:flex;align-items:center;gap:8px">&yen;${c.subtotal.toLocaleString()} <button class="btn btn-sm" style="color:var(--red)" onclick="removeMoCart(${i})">&times;</button></div>
  </div>`).join('');
  const total=moCart.reduce((s,c)=>s+c.subtotal,0);
  document.getElementById('moTotal').textContent=`合計: ¥${total.toLocaleString()}`;
}

async function submitManualOrder(){
  const custId=document.getElementById('moCustomer').value;
  if(!custId){alert('顧客を選択してください');return}
  if(!moCart.length){alert('商品を追加してください');return}
  const cust=allCustomers.find(c=>c.id===custId);
  const total=moCart.reduce((s,c)=>s+c.subtotal,0);
  const code='ORD-'+Date.now().toString(36).toUpperCase();
  const orderData={
    order_code:code,
    customer_id:custId,
    customer_name:cust?.name||'',
    order_date:today(),
    delivery_date:document.getElementById('moDate').value,
    delivery_time_zone:document.getElementById('moTimeZone').value,
    delivery_address:document.getElementById('moAddress').value,
    delivery_name:document.getElementById('moDelivName').value,
    delivery_phone:document.getElementById('moDelivPhone').value,
    price_rank:cust?.price_rank||'standard',
    total_amount:total,
    memo:document.getElementById('moMemo').value,
    channel:document.getElementById('moChannel').value,
    status:'受注'
  };
  try{
    const [order]=await sb('POST','orders',[orderData]);
    const items=moCart.map(c=>({order_id:order.id,product_id:c.product_id,species:c.species,part_name:c.part_name,weight_kg:c.weight_kg,unit_price:c.unit_price,subtotal:c.subtotal,weight:c.weight_kg,amount:c.subtotal}));
    await sb('POST','order_items',items);
    closeModal('manualOrderModal');
    await loadOrders();
    alert('注文を登録しました: '+code);
  }catch(e){alert('登録エラー: '+e.message)}
}

// ── Utils ──
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function pad(n){return String(n).padStart(2,'0')}
function today(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function tomorrow(){const d=new Date();d.setDate(d.getDate()+1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}

init();
</script>
