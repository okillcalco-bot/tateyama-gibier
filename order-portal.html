<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦌</text></svg>">
<title>館山ジビエセンター | ご注文</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN',sans-serif;background:#f5f0eb;color:#333;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
/* Header */
.hdr{background:#2d5a1b;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-logo{font-size:22px}
.hdr-title{font-size:16px;font-weight:700;line-height:1.2}
.hdr-sub{font-size:11px;opacity:.8}
.hdr-back{background:none;border:none;color:#fff;font-size:20px;padding:4px 8px;cursor:pointer;margin-right:4px}
/* Login */
.login-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px 24px}
.login-logo{font-size:60px;margin-bottom:16px}
.login-brand{font-size:20px;font-weight:700;color:#2d5a1b;margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:#777;margin-bottom:32px;text-align:center}
.field{width:100%;margin-bottom:16px}
.field label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:600}
.field input{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:12px;font-size:16px;background:#fff;outline:none;transition:.2s}
.field input:focus{border-color:#2d5a1b}
.err{color:#e53;font-size:13px;margin-bottom:12px;text-align:center;min-height:18px}
.btn-primary{width:100%;padding:16px;background:#2d5a1b;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;transition:.15s;letter-spacing:.5px}
.btn-primary:active{background:#1e3d12;transform:scale(.98)}
.btn-primary:disabled{background:#aaa;cursor:default}
/* Welcome / home */
.welcome-wrap{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:14px}
.welcome-name{font-size:18px;font-weight:700;color:#2d5a1b}
.welcome-greeting{font-size:14px;color:#666;margin-bottom:4px}
.reorder-card{background:#fff8ec;border:2px solid #f5a623;border-radius:16px;padding:18px;cursor:pointer;transition:.15s}
.reorder-card:active{transform:scale(.98)}
.reorder-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.reorder-icon{font-size:28px}
.reorder-label{font-size:16px;font-weight:700;color:#c07000}
.reorder-hint{font-size:12px;color:#888}
.reorder-items{display:flex;flex-wrap:wrap;gap:6px}
.reorder-item-tag{background:#fff;border:1px solid #f5a623;border-radius:20px;padding:5px 12px;font-size:13px;color:#555}
.reorder-date{font-size:11px;color:#aaa;margin-top:8px}
.divider{text-align:center;font-size:12px;color:#aaa;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:calc(50% - 20px);height:1px;background:#ddd}
.divider::before{left:0}.divider::after{right:0}
.new-order-card{background:#fff;border:2px solid #2d5a1b;border-radius:16px;padding:18px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:14px}
.new-order-card:active{transform:scale(.98)}
.new-order-icon{font-size:28px}
.new-order-label{font-size:16px;font-weight:700;color:#2d5a1b}
.new-order-sub{font-size:12px;color:#888}
.history-card{background:#fff;border:2px solid #ddd;border-radius:16px;padding:18px;cursor:pointer;display:flex;align-items:center;gap:14px}
.history-card:active{background:#f5f5f5}
/* Products */
.species-tabs{display:flex;overflow-x:auto;gap:8px;padding:12px 16px;background:#fff;border-bottom:1px solid #eee;-webkit-overflow-scrolling:touch}
.species-tabs::-webkit-scrollbar{display:none}
.sp-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:2px solid #ddd;background:#fff;font-size:14px;cursor:pointer;transition:.15s;white-space:nowrap}
.sp-tab.active{background:#2d5a1b;border-color:#2d5a1b;color:#fff;font-weight:700}
.product-list{flex:1;overflow-y:auto;padding:12px 16px;padding-bottom:100px}
.prod-item{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.prod-info{flex:1}
.prod-name{font-size:15px;font-weight:600;color:#333}
.prod-price{font-size:13px;color:#888;margin-top:2px}
.prod-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:34px;height:34px;border-radius:50%;border:2px solid #2d5a1b;background:#fff;color:#2d5a1b;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.1s}
.qty-btn:active{background:#2d5a1b;color:#fff}
.qty-num{width:30px;text-align:center;font-size:16px;font-weight:700;color:#333}
/* Cart float */
.cart-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#fff;border-top:1px solid #eee;display:none}
.cart-bar.show{display:block}
.cart-btn{width:100%;padding:16px;background:#2d5a1b;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.cart-btn-left{display:flex;align-items:center;gap:8px}
.cart-count-badge{background:#f5a623;color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
/* Cart review */
.cart-wrap{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
.cart-item-row{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.cart-item-info{flex:1}
.cart-item-name{font-size:15px;font-weight:600}
.cart-item-sub{font-size:13px;color:#888;margin-top:2px}
.cart-item-price{font-size:15px;font-weight:700;color:#2d5a1b}
.cart-item-del{background:none;border:none;font-size:20px;color:#ccc;cursor:pointer;padding:4px}
.total-row{background:#fff;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.total-label{font-size:15px;font-weight:600}
.total-price{font-size:22px;font-weight:700;color:#2d5a1b}
.delivery-section{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
.delivery-section h3{font-size:14px;font-weight:700;color:#555;margin-bottom:12px}
.input-row{margin-bottom:12px}
.input-row label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.input-row input,.input-row textarea,.input-row select{width:100%;padding:12px 14px;border:2px solid #eee;border-radius:10px;font-size:15px;background:#f9f9f9;outline:none}
.input-row input:focus,.input-row textarea:focus,.input-row select:focus{border-color:#2d5a1b;background:#fff}
.input-row textarea{resize:vertical;min-height:70px}
.bottom-btn-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#fff;border-top:1px solid #eee}
/* History */
.history-list{flex:1;overflow-y:auto;padding:16px;padding-bottom:32px}
.history-item{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.1s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.history-item:active{background:#f9f9f9}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-date{font-size:14px;font-weight:700;color:#333}
.hist-status{font-size:12px;padding:4px 10px;border-radius:10px;font-weight:600}
.hist-status.delivered{background:#e8f5e9;color:#2d5a1b}
.hist-status.pending{background:#fff8ec;color:#c07000}
.hist-status.confirmed{background:#e3f2fd;color:#1565c0}
.hist-items{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.hist-tag{background:#f5f5f5;border-radius:10px;padding:3px 10px;font-size:12px;color:#555}
.hist-total{font-size:14px;color:#666}
.hist-reorder-btn{width:100%;padding:12px;background:#fff8ec;border:2px solid #f5a623;border-radius:10px;color:#c07000;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}
.hist-reorder-btn:active{background:#f5a623;color:#fff}
/* Success */
.success-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px 24px;text-align:center}
.success-icon{font-size:72px;margin-bottom:20px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
.success-title{font-size:22px;font-weight:700;color:#2d5a1b;margin-bottom:8px}
.success-sub{font-size:14px;color:#777;line-height:1.6;margin-bottom:32px}
/* Loading */
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);justify-content:center;align-items:center;z-index:200}
.loading.show{display:flex}
.spinner{width:40px;height:40px;border:4px solid #eee;border-top-color:#2d5a1b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 16px;color:#aaa;font-size:14px}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- LOGIN -->
<div class="screen active" id="scrLogin">
  <div style="background:#2d5a1b;padding:40px 24px 32px;text-align:center">
    <div style="font-size:56px;margin-bottom:12px">🦌</div>
    <div style="font-size:22px;font-weight:700;color:#fff">館山ジビエセンター</div>
    <div style="font-size:13px;color:rgba(255,255,255,.75);margin-top:4px">お客様用 ご注文ポータル</div>
  </div>
  <div class="login-wrap" style="padding-top:28px">
    <div class="field"><label>お名前</label><input type="text" id="loginName" placeholder="例：山田太郎" autocomplete="name" inputmode="text"></div>
    <div class="field"><label>パスワード</label><input type="password" id="loginPw" placeholder="パスワード" autocomplete="current-password"></div>
    <div class="err" id="loginErr"></div>
    <button class="btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="scrHome">
  <div class="hdr">
    <div class="hdr-logo">🦌</div>
    <div><div class="hdr-title">館山ジビエセンター</div><div class="hdr-sub">お客様用ポータル</div></div>
    <div style="margin-left:auto"><button onclick="doLogout()" style="background:none;border:1px solid rgba(255,255,255,.5);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer">ログアウト</button></div>
  </div>
  <div class="welcome-wrap">
    <div class="welcome-greeting" id="homeGreeting">お常まいありがとうございます</div>
    <div class="welcome-name" id="homeName"></div>

    <!-- Reorder button (shown when history exists) -->
    <div id="reorderCard" style="display:none" onclick="doReorder()">
      <div class="reorder-card">
        <div class="reorder-card-top">
          <div class="reorder-icon">🔁</div>
          <div>
            <div class="reorder-label">前回と同じ注文をする</div>
            <div class="reorder-hint">ワンタップで前回の内容をカートに追加</div>
          </div>
        </div>
        <div class="reorder-items" id="lastOrderItems"></div>
        <div class="reorder-date" id="lastOrderDate"></div>
      </div>
    </div>

    <div class="divider">または</div>

    <div class="new-order-card" onclick="goNewOrder()">
      <div class="new-order-icon">🛒</div>
      <div>
        <div class="new-order-label">新しく注文する</div>
        <div class="new-order-sub">商品一覧から選ぶ</div>
      </div>
      <div style="margin-left:auto;font-size:20px;color:#ccc">›</div>
    </div>

    <div class="history-card" onclick="goHistory()">
      <div style="font-size:28px">📋</div>
      <div>
        <div style="font-size:16px;font-weight:700;color:#333">注文履歴</div>
        <div style="font-size:12px;color:#888">過去の注文を確認</div>
      </div>
      <div style="margin-left:auto;font-size:20px;color:#ccc">›</div>
    </div>
  </div>
</div>

<!-- PRODUCT SELECTION -->
<div class="screen" id="scrProducts">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('scrHome')">‹</button>
    <div><div class="hdr-title">商品を選ぶ</div></div>
    <div style="margin-left:auto;font-size:13px;color:rgba(255,255,255,.8)" id="prodCartCount"></div>
  </div>
  <div class="species-tabs" id="speciesTabs"></div>
  <div class="product-list" id="productList"></div>
  <div class="cart-bar" id="cartBar">
    <button class="cart-btn" onclick="goCart()">
      <div class="cart-btn-left"><span class="cart-count-badge" id="cartBadge">0</span><span>カートを確認</span></div>
      <span id="cartTotal">¥0</span>
    </button>
  </div>
</div>

<!-- CART -->
<div class="screen" id="scrCart">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('scrProducts')">‹</button>
    <div><div class="hdr-title">注文内容の確認</div></div>
  </div>
  <div class="cart-wrap">
    <div id="cartItems"></div>
    <div class="total-row"><span class="total-label">合計金額</span><span class="total-price" id="cartTotalAmt">¥0</span></div>
    <div class="delivery-section">
      <h3>お届け先・配送情報</h3>
      <div class="input-row"><label>配送希望日</label><input type="date" id="delivDate" min=""></div>
      <div class="input-row"><label>時間帯</label>
        <select id="delivTime">
          <option value="">指定なし</option>
          <option>9:00～12:00</option><option>12:00～14:00</option>
          <option>14:00～16:00</option><option>16:00～18:00</option>
          <option>18:00～20:00</option>
        </select>
      </div>
      <div class="input-row"><label>備考メモ</label><textarea id="orderMemo" placeholder="例：切り分け方、包装の希望など"></textarea></div>
    </div>
    <div class="delivery-section" id="addrSection">
      <h3>配送先</h3>
      <div id="addrDisplay" style="font-size:14px;color:#555;line-height:1.6"></div>
    </div>
  </div>
  <div class="bottom-btn-wrap">
    <button class="btn-primary" id="submitBtn" onclick="submitOrder()">注文を確定する</button>
  </div>
</div>

<!-- SUCCESS -->
<div class="screen" id="scrSuccess">
  <div class="hdr"><div class="hdr-logo">🦌</div><div><div class="hdr-title">注文完了</div></div></div>
  <div class="success-wrap">
    <div class="success-icon">✅</div>
    <div class="success-title">ご注文ありがとうございます！</div>
    <div class="success-sub">注文を受け付けました。<br>確認後、担当よりご連絡いたします。</div>
    <button class="btn-primary" onclick="showScreen('scrHome');loadHome()">ホームに戻る</button>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="scrHistory">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('scrHome')">‹</button>
    <div><div class="hdr-title">注文履歴</div></div>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
const SB_URL="https://clpdyrehdgzgiidbfucj.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNscGR5cmVoZGd6Z2lpZGJmdWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODEzNDksImV4cCI6MjA4ODg1NzM0OX0.cKxpyw0gyZj0Flsd8wzojiNFqyCEcrAF8tFpXXUmZck";

async function sb(method,table,body,query=''){
  const res=await fetch(SB_URL+'/rest/v1/'+table+(query||''),{
    method,
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':method==='GET'?'return=representation':'return=representation'},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.json().catch(()=>[]);
}

let currentCust=null, cart=[], products=[], currentSpecies='';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function loading(on){document.getElementById('loading').classList.toggle('show',on);}
function fmtPrice(n){return '¥'+Number(n||0).toLocaleString();}

// LOGIN
async function doLogin(){
  var name=document.getElementById('loginName').value.trim();
  var pw=document.getElementById('loginPw').value.trim();
  if(!name){document.getElementById('loginErr').textContent='お名前を入力してください';return;}
  if(!pw){document.getElementById('loginErr').textContent='パスワードを入力してください';return;}
  loading(true);
  try{
    const data=await sb('GET','customers',null,'?name=ilike.*'+encodeURIComponent(name)+'*&portal_password=eq.'+encodeURIComponent(pw)+'&is_active=eq.true&select=*');
    if(!data||!data.length){document.getElementById('loginErr').textContent='お名前またはパスワードが違います';loading(false);return;}
    var cust=data[0];
    currentCust=cust;
    localStorage.setItem('tgc_cust_id',cust.id);
    await loadHome();
    showScreen('scrHome');
  }catch(e){document.getElementById('loginErr').textContent='エラーが発生しました';console.error(e);}
  loading(false);
}

function doLogout(){currentCust=null;cart=[];localStorage.removeItem('tgc_cust_id');showScreen('scrLogin');}

// HOME
async function loadHome(){
  document.getElementById('homeName').textContent=(currentCust.name||'')+' 様';
  // Load last order
  try{
    var orders=await sb('GET','orders',null,'?customer_id=eq.'+currentCust.id+'&order_by=created_at.desc&limit=1&select=*');
    var card=document.getElementById('reorderCard');
    if(orders&&orders.length){
      var o=orders[0];
      var items=await sb('GET','order_items',null,'?order_id=eq.'+o.id+'&select=*');
      var tags=document.getElementById('lastOrderItems');
      tags.innerHTML=(items||[]).slice(0,4).map(i=>'<span class="reorder-item-tag">'+i.part_name+'</span>').join('');
      var d=new Date(o.created_at);
      document.getElementById('lastOrderDate').textContent='前回注文日: '+d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
      window._lastOrder={order:o,items:items||[]};
      card.style.display='block';
    }else{card.style.display='none';}
  }catch(e){document.getElementById('reorderCard').style.display='none';}
}

// REORDER
async function doReorder(){
  if(!window._lastOrder)return;
  cart=window._lastOrder.items.map(i=>({
    id:i.product_id||i.id,
    name:i.part_name||i.name,
    price:i.unit_price||i.price||0,
    qty:i.quantity||1,
    unit:i.unit||'kg'
  }));
  showScreen('scrCart');
  renderCart();
}

// NEW ORDER
async function goNewOrder(){
  loading(true);
  try{
    var data=await sb('GET','price_master',null,'?select=*&order=species.asc,part.asc');
    products=data||[];
    buildSpeciesTabs();
    renderProducts(products);
    updateCartBar();
    showScreen('scrProducts');
  }catch(e){alert('商品の読み込みに失敗しました');}
  loading(false);
}

function buildSpeciesTabs(){
  var sps=Array.from({length:0}).concat(products.map(p=>p.species).filter((s,i,a)=>a.indexOf(s)===i&&s));
  var tabs=document.getElementById('speciesTabs');
  tabs.innerHTML='<button class="sp-tab active" onclick="filterSpecies('',this)">すべて</button>'+
    sps.map(s=>'<button class="sp-tab" onclick="filterSpecies(''+s+'',this)">'+s+'</button>').join('');
}

function filterSpecies(sp,btn){
  currentSpecies=sp;
  document.querySelectorAll('.sp-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(sp?products.filter(p=>p.species===sp):products);
}

function renderProducts(list){
  var el=document.getElementById('productList');
  if(!list.length){el.innerHTML='<div class="empty">商品がありません</div>';return;}
  el.innerHTML=list.map(p=>{
    var ci=cart.find(c=>c.id===p.id);
    var qty=ci?ci.qty:0;
    return '<div class="prod-item" id="pi-'+p.id+'">'+
      '<div class="prod-info"><div class="prod-name">'+p.species+' '+p.part_name+'</div>'+
      '<div class="prod-price">'+fmtPrice(p.unit_price)+'/'+p.unit+'</div></div>'+
      '<div class="prod-ctrl">'+
      '<button class="qty-btn" onclick="changeQty(''+p.id+'',-1)">-</button>'+
      '<span class="qty-num" id="qn-'+p.id+'">'+qty+'</span>'+
      '<button class="qty-btn" onclick="changeQty(''+p.id+'',1)">+</button>'+
      '</div></div>';
  }).join('');
}

function changeQty(id,delta){
  var prod=products.find(p=>p.id===id);
  if(!prod)return;
  var ci=cart.find(c=>c.id===id);
  if(!ci&&delta>0){ci={id:prod.id,name:prod.species+' '+prod.part_name,price:prod.price_standard||0,qty:0,unit:'kg'};cart.push(ci);}
  if(ci){
    ci.qty=Math.max(0,ci.qty+delta);
    if(ci.qty===0)cart=cart.filter(c=>c.id!==id);
    var el=document.getElementById('qn-'+id);
    if(el)el.textContent=ci.qty;
  }
  updateCartBar();
}

function updateCartBar(){
  var total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  var count=cart.reduce((s,c)=>s+c.qty,0);
  var bar=document.getElementById('cartBar');
  bar.classList.toggle('show',cart.length>0);
  document.getElementById('cartBadge').textContent=cart.length;
  document.getElementById('cartTotal').textContent=fmtPrice(total);
  document.getElementById('prodCartCount').textContent=cart.length?cart.length+'点選択中':'';
}

// CART
function goCart(){
  renderCart();
  // Set min date to tomorrow
  var d=new Date();d.setDate(d.getDate()+1);
  document.getElementById('delivDate').min=d.toISOString().slice(0,10);
  document.getElementById('delivDate').value='';
  // Show address
  if(currentCust){
    var a='';
    if(currentCust.postal_code)a+='〒'+currentCust.postal_code+' ';
    a+=(currentCust.address||'');
    document.getElementById('addrDisplay').textContent=a||'住所未登録';
  }
  showScreen('scrCart');
}

function renderCart(){
  var items=document.getElementById('cartItems');
  if(!cart.length){items.innerHTML='<div class="empty">カートは空です</div>';document.getElementById('cartTotalAmt').textContent=fmtPrice(0);return;}
  items.innerHTML=cart.map(c=>'<div class="cart-item-row">'+
    '<div class="cart-item-info">'+
    '<div class="cart-item-name">'+c.name+'</div>'+
    '<div class="cart-item-sub">'+c.qty+c.unit+' × '+fmtPrice(c.price)+'</div>'+
    '</div>'+
    '<div class="cart-item-price">'+fmtPrice(c.price*c.qty)+'</div>'+
    '<button class="cart-item-del" onclick="removeCartItem(''+c.id+'')">&#x2715;</button>'+
    '</div>').join('');
  var total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  document.getElementById('cartTotalAmt').textContent=fmtPrice(total);
}

function removeCartItem(id){
  cart=cart.filter(c=>c.id!==id);
  renderCart();
  updateCartBar();
}

async function submitOrder(){
  if(!cart.length){alert('商品を選んでください');return;}
  var btn=document.getElementById('submitBtn');
  btn.disabled=true;
  loading(true);
  try{
    var delivDate=document.getElementById('delivDate').value;
    var delivTime=document.getElementById('delivTime').value;
    var memo=document.getElementById('orderMemo').value;
    var total=cart.reduce((s,c)=>s+c.price*c.qty,0);
    var oCode='ORD-'+Date.now();
    var order=await sb('POST','orders',{order_code:oCode,
      customer_id:currentCust.id,
      status:'受付',
      delivery_date:delivDate||null,
      notes:memo||null,
      total_amount:total
    });
    var orderId=(order&&order[0])?order[0].id:null;
    if(orderId){
      for(var c of cart){
        await sb('POST','order_items',{
          order_id:orderId,
          part_name:c.name,
          species:c.name.split(' ')[0]||'',
          weight:c.qty,
          unit_price:c.price,
          amount:c.price*c.qty
        });
      }
    }
    cart=[];
    showScreen('scrSuccess');
  }catch(e){alert('注文の送信に失敗しました。もう一度お試しください。
'+e.message);}
  btn.disabled=false;
  loading(false);
}

// HISTORY
async function goHistory(){
  loading(true);
  showScreen('scrHistory');
  try{
    var orders=await sb('GET','orders',null,'?customer_id=eq.'+currentCust.id+'&order_by=created_at.desc&limit=20&select=*');
    var list=document.getElementById('historyList');
    if(!orders||!orders.length){list.innerHTML='<div class="empty">注文履歴がありません</div>';loading(false);return;}
    var rows=[];
    window._histOrders=[];var idx=0;
    for(var o of orders){
      var items=await sb('GET','order_items',null,'?order_id=eq.'+o.id+'&select=*');
      var d=new Date(o.created_at);
      var dateStr=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
      var statusCls=o.status==='配送済'?'delivered':(o.status==='確認済'?'confirmed':'pending');
      window._histOrders.push(items||[]);idx++;
      rows.push('<div class="history-item">'+
        '<div class="hist-top"><span class="hist-date">'+dateStr+'</span><span class="hist-status '+statusCls+'">'+(o.status||'受付済')+'</span></div>'+
        '<div class="hist-items">'+(items||[]).slice(0,4).map(i=>'<span class="hist-tag">'+i.part_name+'</span>').join('')+'</div>'+
        '<div class="hist-total">合計 '+fmtPrice(o.total_amount)+'</div>'+
        '<button class="hist-reorder-btn" onclick="reorderFromHistory('+idx)+')">&#x1F501; この注文を繰り返す</button>'+
        '</div>');
    }
    list.innerHTML=rows.join('');
  }catch(e){document.getElementById('historyList').innerHTML='<div class="empty">読み込みエラー</div>';}
  loading(false);
}

function reorderFromHistory(n){
  var items=window._histOrders[parseInt(n)]||[];
  cart=items.map(function(i){return {id:i.product_id||i.id,name:i.part_name||i.name,price:i.unit_price||i.price||0,qty:i.quantity||1,unit:i.unit||'kg'};});
  goCart();
}));
  goCart();
}

// Auto login if session saved
(async function init(){
  var sid=localStorage.getItem('tgc_cust_id');
  if(sid){
    loading(true);
    try{
      var data=await sb('GET','customers',null,'?id=eq.'+sid+'&select=*');
      if(data&&data[0]){currentCust=data[0];await loadHome();showScreen('scrHome');}
    }catch(e){}
    loading(false);
  }
})();
</script>
