<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>館山ジビエセンター | ご注文</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E🦌%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f0eb;color:#333;min-height:100vh}
.screen{display:none;padding:16px;max-width:480px;margin:0 auto;min-height:100vh}
.screen.active{display:block}
h1{font-size:1.3rem;font-weight:700;color:#5a3e28;margin-bottom:16px;text-align:center}
h2{font-size:1.1rem;font-weight:700;color:#5a3e28;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;text-align:center;margin-bottom:8px;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-primary{background:#8b5e3c;color:#fff}
.btn-secondary{background:#e8ddd3;color:#5a3e28}
.btn-sm{padding:8px 14px;font-size:.85rem;width:auto;display:inline-block;margin-bottom:0}
input[type=text],input[type=password]{width:100%;padding:12px;border:1.5px solid #d4c4b0;border-radius:8px;font-size:1rem;margin-bottom:10px;outline:none}
input:focus{border-color:#8b5e3c}
label{display:block;font-size:.85rem;color:#666;margin-bottom:4px;font-weight:600}
.logo{text-align:center;font-size:2.5rem;margin:24px 0 8px}
.subtitle{text-align:center;color:#8b5e3c;font-weight:700;margin-bottom:24px;font-size:.95rem}
.tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.tab{padding:8px 16px;border-radius:20px;border:1.5px solid #d4c4b0;background:#fff;font-size:.85rem;cursor:pointer;white-space:nowrap;font-weight:600}
.tab.active{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
.product-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0e8df}
.product-item:last-child{border-bottom:none}
.product-name{font-weight:600;font-size:.95rem}
.product-price{color:#8b5e3c;font-weight:700;font-size:.9rem}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid #8b5e3c;background:#fff;color:#8b5e3c;font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.qty-num{min-width:20px;text-align:center;font-weight:700}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0e8df}
.cart-item:last-child{border-bottom:none}
.total-row{display:flex;justify-content:space-between;padding:12px 0;font-weight:700;font-size:1.05rem}
.badge{background:#e85c3a;color:#fff;border-radius:10px;padding:2px 8px;font-size:.75rem;margin-left:6px;font-weight:700}
.history-item{border-bottom:1px solid #f0e8df;padding:10px 0}
.history-item:last-child{border-bottom:none}
.history-date{font-size:.8rem;color:#888;margin-bottom:4px}
.history-summary{font-size:.9rem;margin-bottom:6px}
.status-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.75rem;font-weight:700;background:#e8ddd3;color:#5a3e28;margin-bottom:6px}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:99;align-items:center;justify-content:center;font-size:1.1rem;color:#8b5e3c;font-weight:700}
.loading-overlay.show{display:flex}
.top-bar{display:flex;align-items:center;margin-bottom:16px;gap:8px}
.top-bar h2{margin-bottom:0;flex:1}
.back-btn{background:none;border:none;font-size:1.4rem;cursor:pointer;padding:0;color:#8b5e3c}
.empty-msg{text-align:center;color:#aaa;padding:24px 0;font-size:.95rem}
.success-icon{text-align:center;font-size:4rem;margin:24px 0 12px}
.notes-area{width:100%;padding:10px;border:1.5px solid #d4c4b0;border-radius:8px;font-size:.95rem;min-height:70px;resize:vertical;margin-bottom:10px;font-family:inherit}
.notes-area:focus{outline:none;border-color:#8b5e3c}
.user-greeting{font-size:.85rem;color:#888;text-align:right;margin-bottom:8px}
</style>
</head>
<body>
<div class="loading-overlay" id="ld">読み込み中…</div>

<!-- s0: ログイン -->
<div class="screen active" id="s0">
  <div class="logo">🦌</div>
  <h1>館山ジビエセンター</h1>
  <div class="subtitle">お客様専用 ご注文ポータル</div>
  <div class="card">
    <label>お名前</label>
    <input type="text" id="iName" placeholder="例：山田 太郎">
    <label>パスワード</label>
    <input type="password" id="iPass" placeholder="パスワード">
    <div id="loginErr" style="color:#c0392b;font-size:.85rem;margin-bottom:8px;display:none"></div>
    <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
  </div>
</div>

<!-- s1: ホーム -->
<div class="screen" id="s1">
  <div class="user-greeting" id="greet"></div>
  <div class="logo" style="font-size:2rem;margin:8px 0">🦌</div>
  <h1>館山ジビエセンター</h1>
  <div id="lastOrderCard"></div>
  <button class="btn btn-primary" onclick="goProducts()">🛒 新しく注文する</button>
  <button class="btn btn-secondary" onclick="goHistory()">📋 注文履歴</button>
  <button class="btn btn-secondary" style="margin-top:8px" onclick="doLogout()">ログアウト</button>
</div>

<!-- s2: 商品選択 -->
<div class="screen" id="s2">
  <div class="top-bar">
    <button class="back-btn" onclick="showS(1)">←</button>
    <h2>商品を選ぶ</h2>
    <span id="cartBadge"></span>
  </div>
  <div class="tabs" id="speciesTabs"></div>
  <div class="card" id="productList"></div>
  <button class="btn btn-primary" onclick="goCart()" style="margin-top:8px" id="toCartBtn">カートを確認する</button>
</div>

<!-- s3: カート -->
<div class="screen" id="s3">
  <div class="top-bar">
    <button class="back-btn" onclick="showS(2)">←</button>
    <h2>ご注文内容の確認</h2>
  </div>
  <div class="card" id="cartDetail"></div>
  <div class="card">
    <label>備考（任意）</label>
    <textarea class="notes-area" id="notesTxt" placeholder="配送希望日・その他ご要望など"></textarea>
  </div>
  <button class="btn btn-primary" onclick="doSubmit()">注文を確定する</button>
  <button class="btn btn-secondary" onclick="showS(2)">商品に戻る</button>
</div>

<!-- s4: 注文完了 -->
<div class="screen" id="s4">
  <div class="success-icon">✅</div>
  <h1>ご注文ありがとうございます！</h1>
  <div class="card" id="successDetail"></div>
  <button class="btn btn-primary" onclick="backHome()">トップに戻る</button>
</div>

<!-- s5: 注文履歴 -->
<div class="screen" id="s5">
  <div class="top-bar">
    <button class="back-btn" onclick="showS(1)">←</button>
    <h2>注文履歴</h2>
  </div>
  <div id="historyList"></div>
</div>

<script>
var SB_URL = 'https://clpdyrehdgzgiidbfucj.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNscGR5cmVoZGd6Z2lpZGJmdWNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODEzNDksImV4cCI6MjA4ODg1NzM0OX0.cKxpyw0gyZj0Flsd8wzojiNFqyCEcrAF8tFpXXUmZck';
var _cust = null;
var _cart = {};
var _products = [];
var _histOrders = [];

function load(on) {
  document.getElementById('ld').className = on ? 'loading-overlay show' : 'loading-overlay';
}

function showS(n) {
  document.querySelectorAll('.screen').forEach(function(s) { s.className = 'screen'; });
  document.getElementById('s' + n).className = 'screen active';
}

function sb(method, table, body, query) {
  var url = SB_URL + '/rest/v1/' + table + (query ? '?' + query : '');
  var opts = {
    method: method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    }
  };
  if (body) { opts.body = JSON.stringify(body); }
  return fetch(url, opts).then(function(r) {
    if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); }
    var ct = r.headers.get('content-type') || '';
    if (ct.indexOf('json') >= 0) { return r.json(); }
    return r.text();
  });
}

function doLogin() {
  var name = document.getElementById('iName').value.trim();
  var pass = document.getElementById('iPass').value.trim();
  var errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!name || !pass) { errEl.textContent = '名前とパスワードを入力してください'; errEl.style.display = 'block'; return; }
  load(true);
  var q = 'name=eq.' + encodeURIComponent(name) + '&portal_password=eq.' + encodeURIComponent(pass) + '&is_active=eq.true&select=*';
  sb('GET', 'customers', null, q).then(function(rows) {
    load(false);
    if (!rows || rows.length === 0) {
      errEl.textContent = '名前またはパスワードが正しくありません';
      errEl.style.display = 'block';
      return;
    }
    _cust = rows[0];
    loadHome();
  }).catch(function(e) {
    load(false);
    errEl.textContent = 'エラー: ' + e.message;
    errEl.style.display = 'block';
  });
}

function doLogout() {
  _cust = null;
  _cart = {};
  _products = [];
  document.getElementById('iName').value = '';
  document.getElementById('iPass').value = '';
  showS(0);
}

function loadHome() {
  showS(1);
  document.getElementById('greet').textContent = 'ようこそ、' + _cust.name + ' 様';
  var q = 'customer_id=eq.' + _cust.id + '&order=order_date.desc&limit=1&select=*';
  sb('GET', 'orders', null, q).then(function(orders) {
    var card = document.getElementById('lastOrderCard');
    if (!orders || orders.length === 0) {
      card.innerHTML = '<div class="card"><div class="empty-msg">まだ注文履歴がありません</div></div>';
      return;
    }
    var o = orders[0];
    var q2 = 'order_id=eq.' + o.id + '&select=*';
    sb('GET', 'order_items', null, q2).then(function(items) {
      var summary = (items || []).map(function(i) { return i.part_name + ' ' + i.weight + 'kg'; }).join('、');
      card.innerHTML = '<div class="card"><div class="history-date">前回の注文：' + o.order_date + '</div><div class="history-summary">' + (summary || '－') + '</div><button class="btn btn-secondary btn-sm" onclick="doReorder(' + JSON.stringify(items || []) + ')">同じ内容で注文</button></div>';
    });
  }).catch(function() {
    document.getElementById('lastOrderCard').innerHTML = '';
  });
}

function doReorder(items) {
  _cart = {};
  (items || []).forEach(function(i) {
    var key = i.species + '|' + i.part_name;
    _cart[key] = { species: i.species, part_name: i.part_name, weight: i.weight, unit_price: i.unit_price };
  });
  goCart();
}

function goProducts() {
  _cart = {};
  load(true);
  sb('GET', 'price_master', null, 'select=species,part_name,grade,price_standard,price_premium,price_wholesale&order=species,part_name').then(function(rows) {
    load(false);
    _products = rows || [];
    var rank = (_cust && _cust.price_rank) ? _cust.price_rank : 'standard';
    var speciesSet = [];
    _products.forEach(function(p) { if (speciesSet.indexOf(p.species) < 0) { speciesSet.push(p.species); } });
    var tabsEl = document.getElementById('speciesTabs');
    tabsEl.innerHTML = '';
    speciesSet.forEach(function(sp, i) {
      var t = document.createElement('div');
      t.className = 'tab' + (i === 0 ? ' active' : '');
      t.textContent = sp;
      t.onclick = (function(s, el) { return function() {
        document.querySelectorAll('.tab').forEach(function(x) { x.className = 'tab'; });
        el.className = 'tab active';
        renderProducts(s, rank);
      }; })(sp, t);
      tabsEl.appendChild(t);
    });
    if (speciesSet.length > 0) { renderProducts(speciesSet[0], rank); }
    showS(2);
    updateCartBadge();
  }).catch(function(e) {
    load(false);
    alert('商品情報の取得に失敗する: ' + e.message);
  });
}

function getPrice(p, rank) {
  if (rank === 'premium') { return p.price_premium || p.price_standard; }
  if (rank === 'wholesale') { return p.price_wholesale || p.price_standard; }
  return p.price_standard;
}

function renderProducts(species, rank) {
  var list = document.getElementById('productList');
  var filtered = _products.filter(function(p) { return p.species === species; });
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-msg">商品がありません</div>';
    return;
  }
  list.innerHTML = '';
  filtered.forEach(function(p) {
    var key = p.species + '|' + p.part_name;
    var price = getPrice(p, rank);
    var qty = (_cart[key] && _cart[key].weight) ? _cart[key].weight : 0;
    var div = document.createElement('div');
    div.className = 'product-item';
    div.id = 'pi_' + key.replace(/[^a-zA-Z0-9]/g, '_');
    div.innerHTML = '<div><div class="product-name">' + p.part_name + '</div><div class="product-price">¥' + price.toLocaleString() + ' / kg</div></div>' +
      '<div class="qty-ctrl">' +
      '<button class="qty-btn" onclick="chgQty(\'' + key + '\',-1)">－</button>' +
      '<span class="qty-num" id="q_' + key.replace(/[^a-zA-Z0-9]/g, '_') + '">' + qty + '</span>' +
      '<button class="qty-btn" onclick="chgQty(\'' + key + '\',1)">＋</button>' +
      '</div>';
    div.setAttribute('data-key', key);
    div.setAttribute('data-species', p.species);
    div.setAttribute('data-part', p.part_name);
    div.setAttribute('data-price', price);
    list.appendChild(div);
  });
}

function chgQty(key, delta) {
  var cur = (_cart[key] && _cart[key].weight) ? _cart[key].weight : 0;
  var next = Math.max(0, cur + delta);
  var el = document.getElementById('pi_' + key.replace(/[^a-zA-Z0-9]/g, '_'));
  if (el) {
    var sp = el.getAttribute('data-species');
    var pt = el.getAttribute('data-part');
    var pr = parseInt(el.getAttribute('data-price'));
    if (next > 0) {
      _cart[key] = { species: sp, part_name: pt, weight: next, unit_price: pr };
    } else {
      delete _cart[key];
    }
  }
  var qEl = document.getElementById('q_' + key.replace(/[^a-zA-Z0-9]/g, '_'));
  if (qEl) { qEl.textContent = next; }
  updateCartBadge();
}

function updateCartBadge() {
  var total = 0;
  Object.keys(_cart).forEach(function(k) { total += (_cart[k].weight || 0); });
  var badge = document.getElementById('cartBadge');
  badge.innerHTML = total > 0 ? '<span class="badge">' + total + 'kg</span>' : '';
  document.getElementById('toCartBtn').style.opacity = total > 0 ? '1' : '0.5';
}

function goCart() {
  var keys = Object.keys(_cart);
  if (keys.length === 0) { alert('商品を選んでください'); return; }
  var html = '';
  var total = 0;
  keys.forEach(function(k) {
    var item = _cart[k];
    var sub = item.weight * item.unit_price;
    total += sub;
    html += '<div class="cart-item"><div><div class="product-name">' + item.species + ' ' + item.part_name + '</div>' +
      '<div style="font-size:.85rem;color:#888">' + item.weight + 'kg × ¥' + item.unit_price.toLocaleString() + '</div></div>' +
      '<div style="font-weight:700">¥' + sub.toLocaleString() + '</div></div>';
  });
  html += '<div class="total-row"><span>合計</span><span style="color:#8b5e3c">¥' + total.toLocaleString() + '</span></div>';
  document.getElementById('cartDetail').innerHTML = html;
  document.getElementById('notesTxt').value = '';
  showS(3);
}

function doSubmit() {
  var keys = Object.keys(_cart);
  if (keys.length === 0) { alert('カートが空です'); return; }
  var total = 0;
  keys.forEach(function(k) { total += _cart[k].weight * _cart[k].unit_price; });
  var notes = document.getElementById('notesTxt').value.trim();
  var oCode = 'ORD-' + Date.now();
  var today = new Date().toISOString().slice(0, 10);
  load(true);
  sb('POST', 'orders', {
    order_code: oCode,
    customer_id: _cust.id,
    order_date: today,
    status: '受付',
    total_amount: total,
    notes: notes || null
  }, null).then(function(res) {
    var order = Array.isArray(res) ? res[0] : res;
    var orderId = order.id;
    var items = keys.map(function(k) {
      var it = _cart[k];
      return { order_id: orderId, species: it.species, part_name: it.part_name, weight: it.weight, unit_price: it.unit_price, amount: it.weight * it.unit_price };
    });
    return sb('POST', 'order_items', items, null);
  }).then(function() {
    load(false);
    _cart = {};
    var total2 = 0;
    keys.forEach(function(k) { var it = _cart[k] || {}; total2 += (it.weight || 0) * (it.unit_price || 0); });
    document.getElementById('successDetail').innerHTML = '<div class="total-row"><span>注文番号</span><span>' + oCode + '</span></div>';
    showS(4);
  }).catch(function(e) {
    load(false);
    alert('注文の送信に失敗しました: ' + e.message);
  });
}

function backHome() {
  loadHome();
}

function goHistory() {
  load(true);
  var q = 'customer_id=eq.' + _cust.id + '&order=order_date.desc&select=*';
  sb('GET', 'orders', null, q).then(function(orders) {
    if (!orders || orders.length === 0) {
      load(false);
      document.getElementById('historyList').innerHTML = '<div class="card"><div class="empty-msg">注文履歴がありません</div></div>';
      showS(5);
      return;
    }
    var fetches = orders.map(function(o) {
      return sb('GET', 'order_items', null, 'order_id=eq.' + o.id + '&select=*');
    });
    Promise.all(fetches).then(function(allItems) {
      load(false);
      _histOrders = [];
      var html = '';
      orders.forEach(function(o, i) {
        var items = allItems[i] || [];
        _histOrders.push(items);
        var summary = items.map(function(it) { return it.part_name + ' ' + it.weight + 'kg'; }).join('、');
        var total = items.reduce(function(acc, it) { return acc + (it.amount || 0); }, 0);
        html += '<div class="card history-item">' +
          '<div class="history-date">' + o.order_date + '</div>' +
          '<div class="status-badge">' + o.status + '</div>' +
          '<div class="history-summary">' + (summary || '－') + '</div>' +
          '<div style="font-weight:700;color:#8b5e3c;margin-bottom:6px">¥' + total.toLocaleString() + '</div>' +
          '<button class="btn btn-secondary btn-sm" onclick="reorderFromHistory(' + i + ')">同じ内容で注文</button>' +
          '</div>';
      });
      document.getElementById('historyList').innerHTML = html;
      showS(5);
    });
  }).catch(function(e) {
    load(false);
    alert('履歴の取得に失敗しました: ' + e.message);
  });
}

function reorderFromHistory(idx) {
  var items = _histOrders[idx] || [];
  if (items.length === 0) { alert('注文内容がありません'); return; }
  _cart = {};
  items.forEach(function(i) {
    var key = i.species + '|' + i.part_name;
    _cart[key] = { species: i.species, part_name: i.part_name, weight: i.weight, unit_price: i.unit_price };
  });
  goCart();
}
</script>
</body>
</html>
